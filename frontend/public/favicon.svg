<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with warm saffron color -->
  <circle cx="50" cy="50" r="50" fill="#D4AF37"/>
  
  <!-- Elegant plate design -->
  <circle cx="50" cy="50" r="35" fill="#FFFFFF" stroke="#8B7355" stroke-width="2"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#D4AF37" stroke-width="1"/>
  
  <!-- Stylized saffron strands forming S shape -->
  <path d="M 42 35 Q 38 42 40 48 Q 42 54 48 56" 
        stroke="#C9A961" 
        stroke-width="3" 
        stroke-linecap="round" 
        fill="none"/>
  <path d="M 48 56 Q 54 58 58 54 Q 62 50 60 44" 
        stroke="#C9A961" 
        stroke-width="3" 
        stroke-linecap="round" 
        fill="none"/>
  
  <!-- Fork and knife silhouette -->
  <g opacity="0.6">
    <!-- Fork on left -->
    <line x1="32" y1="45" x2="32" y2="65" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="45" x2="30" y2="50" stroke="#8B7355" stroke-width="1" stroke-linecap="round"/>
    <line x1="34" y1="45" x2="34" y2="50" stroke="#8B7355" stroke-width="1" stroke-linecap="round"/>
    
    <!-- Knife on right -->
    <line x1="68" y1="45" x2="68" y2="65" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 66 45 L 68 42 L 70 45 Z" fill="#8B7355"/>
  </g>
</svg>
